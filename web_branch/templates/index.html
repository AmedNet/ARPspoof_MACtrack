<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>截图工具2016 Pro 破解版</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        :root {
            --bg-main: #06080f;
            --bg-side: #0c1022;
            --accent-primary: #6366f1;
            --accent-primary-glow: rgba(99, 102, 241, 0.4);
            --accent-success: #10b981;
            --accent-danger: #ef4444;
            --accent-warning: #f59e0b;
            --text-main: #f1f5f9;
            --text-muted: #64748b;
            --border: rgba(148, 163, 184, 0.08);
            --glass: rgba(255, 255, 255, 0.02);
        }

        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background: var(--bg-main);
            color: var(--text-main);
            display: flex;
            height: 100vh;
            overflow: hidden;
            animation: pageLoad 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }

        @keyframes pageLoad {
            from {
                opacity: 0;
                transform: scale(0.98);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        /* ── Ambient background ── */
        body::before {
            content: '';
            position: fixed;
            top: -40%;
            right: -20%;
            width: 70vw;
            height: 70vw;
            background: radial-gradient(circle, rgba(99,102,241,0.06) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }
        body::after {
            content: '';
            position: fixed;
            bottom: -30%;
            left: -10%;
            width: 50vw;
            height: 50vw;
            background: radial-gradient(circle, rgba(139,92,246,0.04) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        /* ── Sidebar ── */
        .sidebar {
            width: 310px;
            background: var(--bg-side);
            padding: 32px 24px 24px;
            display: flex;
            flex-direction: column;
            z-index: 10;
            height: 100vh;
            overflow-y: auto;
            flex-shrink: 0;
            position: relative;
            border-right: 1px solid var(--border);
        }

        .sidebar::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 2px;
            height: 100%;
            background: linear-gradient(180deg, #6366f1 0%, #8b5cf6 40%, #10b981 100%);
            opacity: 0.7;
        }

        .sidebar::after {
            content: '';
            position: absolute;
            top: 0;
            right: 0;
            width: 1px;
            height: 100%;
            background: linear-gradient(180deg, transparent, rgba(99,102,241,0.1) 50%, transparent);
            pointer-events: none;
        }

        .sidebar::-webkit-scrollbar {
            width: 4px;
        }
        .sidebar::-webkit-scrollbar-track {
            background: transparent;
        }
        .sidebar::-webkit-scrollbar-thumb {
            background: rgba(99, 102, 241, 0.3);
            border-radius: 4px;
        }
        .sidebar::-webkit-scrollbar-thumb:hover {
            background: rgba(99, 102, 241, 0.5);
        }

        .sidebar h2 {
            font-size: 1.15rem;
            margin-bottom: 28px;
            text-align: center;
            font-weight: 700;
            letter-spacing: -0.01em;
            color: #c7d2fe;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .sidebar h2::before,
        .sidebar h2::after {
            content: '';
            width: 24px;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(165,180,252,0.3));
        }
        .sidebar h2::after {
            background: linear-gradient(90deg, rgba(165,180,252,0.3), transparent);
        }

        .info-text {
            font-size: 11px;
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.08), rgba(139, 92, 246, 0.06));
            color: #a5b4fc;
            padding: 14px 16px;
            border-radius: 12px;
            margin-bottom: 24px;
            text-align: center;
            border: 1px solid rgba(99, 102, 241, 0.12);
            font-weight: 600;
            letter-spacing: 0.04em;
            font-family: 'JetBrains Mono', monospace;
            position: relative;
            overflow: hidden;
        }
        .info-text::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 200%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(99,102,241,0.04), transparent);
        }

        @keyframes shimmer {
            0%, 100% { transform: translateX(-30%); }
            50% { transform: translateX(30%); }
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            font-size: 10px;
            font-weight: 700;
            color: var(--text-muted);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        input[type="text"], input[type="number"] {
            width: 100%;
            background: rgba(6, 8, 15, 0.6);
            border: 1px solid var(--border);
            color: #e2e8f0;
            padding: 12px 14px;
            font-size: 12px;
            border-radius: 10px;
            box-sizing: border-box;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            font-family: 'JetBrains Mono', monospace;
        }

        input[type="text"]:focus, input[type="number"]:focus {
            border-color: rgba(99, 102, 241, 0.5);
            outline: none;
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.08), 0 0 20px rgba(99, 102, 241, 0.05);
            background: rgba(6, 8, 15, 0.8);
        }

        input[type="text"]::placeholder, input[type="number"]::placeholder {
            color: rgba(100, 116, 139, 0.5);
        }

        button {
            width: 100%;
            padding: 13px 18px;
            margin-top: 10px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            font-size: 12.5px;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            letter-spacing: 0.02em;
            position: relative;
            overflow: hidden;
        }

        button:active {
            transform: scale(0.97);
        }

        .btn-scan {
            background: linear-gradient(135deg, #6366f1, #7c3aed);
            color: white;
            box-shadow: 0 4px 16px rgba(99, 102, 241, 0.2);
        }
        .btn-scan:hover {
            box-shadow: 0 6px 24px rgba(99, 102, 241, 0.35);
            transform: translateY(-1px);
        }

        .btn-attack {
            background: linear-gradient(135deg, #10b981, #059669);
            color: white;
            box-shadow: 0 4px 16px rgba(16, 185, 129, 0.2);
        }
        .btn-attack:hover {
            box-shadow: 0 6px 24px rgba(16, 185, 129, 0.35);
            transform: translateY(-1px);
        }

        .btn-stop {
            background: linear-gradient(135deg, #ef4444, #dc2626);
            color: white;
            animation: pulse-danger 2.5s infinite;
            box-shadow: 0 4px 16px rgba(239, 68, 68, 0.25);
        }
        .btn-stop:hover {
            box-shadow: 0 6px 24px rgba(239, 68, 68, 0.4);
        }

        .btn-tool {
            background: var(--glass);
            border: 1px solid var(--border);
            color: var(--text-muted);
        }
        .btn-tool:hover {
            border-color: rgba(245, 158, 11, 0.3);
            color: var(--accent-warning);
            background: rgba(245, 158, 11, 0.04);
        }

        .checkbox-container {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
            padding: 14px 16px;
            background: var(--glass);
            border-radius: 12px;
            border: 1px solid var(--border);
            transition: all 0.25s;
        }
        .checkbox-container:hover {
            border-color: rgba(99, 102, 241, 0.2);
            background: rgba(99, 102, 241, 0.03);
        }

        #bi_dir {
            appearance: none;
            -webkit-appearance: none;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(148, 163, 184, 0.2);
            border-radius: 6px;
            cursor: pointer;
            position: relative;
            transition: all 0.2s;
            background: rgba(0,0,0,0.3);
            vertical-align: middle;
            flex-shrink: 0;
        }
        #bi_dir:checked {
            background: linear-gradient(135deg, #6366f1, #7c3aed);
            border-color: transparent;
            box-shadow: 0 0 10px rgba(99, 102, 241, 0.3);
        }
        #bi_dir:checked::after {
            content: '✓';
            position: absolute;
            color: white;
            font-size: 12px;
            font-weight: bold;
            left: 4px;
            top: -1px;
        }
        #bi_dir:hover:not(:disabled) {
            border-color: var(--accent-primary);
        }
        .checkbox-container label {
            cursor: pointer;
            font-size: 13px;
            color: var(--text-main);
            font-weight: 500;
        }

        /* ── Main Content ── */
        .main-content {
            flex: 1;
            padding: 32px 36px;
            display: flex;
            flex-direction: column;
            z-index: 2;
            position: relative;
        }

        .toolbar {
            margin-bottom: 20px;
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .mini-btn {
            width: auto;
            padding: 9px 20px;
            background: var(--glass);
            border: 1px solid var(--border);
            color: var(--text-muted);
            font-size: 11px;
            font-weight: 600;
            border-radius: 8px;
            transition: all 0.25s;
        }
        .mini-btn:hover {
            background: rgba(99, 102, 241, 0.06);
            border-color: rgba(99, 102, 241, 0.25);
            color: #c7d2fe;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.08);
        }

        .list-header {
            font-size: 11px;
            color: var(--text-muted);
            margin-bottom: 14px;
            padding-left: 16px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .list-header::before {
            content: '';
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--accent-primary);
            box-shadow: 0 0 8px var(--accent-primary-glow);
        }


        .list-container {
            flex: 1;
            background: rgba(12, 16, 34, 0.5);
            border-radius: 16px;
            border: 1px solid var(--border);
            overflow-y: auto;
            backdrop-filter: blur(8px);
        }
        .list-container::-webkit-scrollbar {
            width: 6px;
        }
        .list-container::-webkit-scrollbar-track {
            background: transparent;
        }
        .list-container::-webkit-scrollbar-thumb {
            background: rgba(99, 102, 241, 0.2);
            border-radius: 4px;
        }
        .list-container::-webkit-scrollbar-thumb:hover {
            background: rgba(99, 102, 241, 0.4);
        }

        .player-item {
            display: flex;
            align-items: center;
            padding: 14px 24px;
            border-bottom: 1px solid var(--border);
            cursor: pointer;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            animation: slideIn 0.35s ease-out both;
            position: relative;
        }
        .player-item::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            width: 0;
            height: 100%;
            background: linear-gradient(90deg, rgba(99,102,241,0.06), transparent);
            transition: width 0.3s;
        }
        .player-item:hover::before {
            width: 100%;
        }
        .player-item:hover {
            padding-left: 28px;
        }
        .player-item:last-child {
            border-bottom: none;
        }
        .player-item.is-safe {
            opacity: 0.4;
            filter: grayscale(0.4);
            background: rgba(0,0,0,0.1);
        }

        .p-chk {
            appearance: none;
            -webkit-appearance: none;
            width: 18px;
            height: 18px;
            border: 2px solid rgba(148, 163, 184, 0.15);
            border-radius: 5px;
            margin-right: 16px;
            cursor: pointer;
            position: relative;
            transition: all 0.2s;
            background: rgba(0,0,0,0.2);
            vertical-align: middle;
            flex-shrink: 0;
        }
        .p-chk:checked {
            background: linear-gradient(135deg, #6366f1, #7c3aed);
            border-color: transparent;
            box-shadow: 0 0 8px rgba(99, 102, 241, 0.25);
        }
        .p-chk:checked::after {
            content: '✓';
            position: absolute;
            color: white;
            font-size: 11px;
            font-weight: bold;
            left: 3px;
            top: -2px;
        }
        .p-chk:disabled {
            border-color: rgba(51, 65, 85, 0.5);
            background: rgba(30, 41, 59, 0.5);
            cursor: not-allowed;
            opacity: 0.4;
        }
        .p-chk:hover:not(:disabled) {
            border-color: var(--accent-primary);
            background: rgba(99, 102, 241, 0.08);
        }

        .status-bar {
            font-size: 11px;
            color: var(--text-muted);
            background: rgba(6, 8, 15, 0.7);
            padding: 14px 20px;
            border-radius: 12px;
            text-align: center;
            border: 1px solid var(--border);
            margin-top: 20px;
            font-weight: 600;
            letter-spacing: 0.03em;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            backdrop-filter: blur(8px);
        }

        .status-active {
            color: var(--accent-success) !important;
            background: rgba(16, 185, 129, 0.06);
            border-color: rgba(16, 185, 129, 0.2);
            box-shadow: 0 0 30px rgba(16, 185, 129, 0.05), inset 0 0 30px rgba(16, 185, 129, 0.03);
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-12px); }
            to { opacity: 1; transform: translateX(0); }
        }

        @keyframes pulse-danger {
            0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.3); }
            70% { box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); }
            100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }

        .vip-badge {
            display: inline-flex;
            align-items: center;
            gap: 3px;
            padding: 3px 10px;
            background: linear-gradient(135deg, rgba(245, 158, 11, 0.12), rgba(245, 158, 11, 0.06));
            border: 1px solid rgba(245, 158, 11, 0.2);
            border-radius: 20px;
            font-size: 9px;
            color: var(--accent-warning);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            backdrop-filter: blur(4px);
        }

        /* ══════════════════════════════════════
   ANIMATIONS
   ══════════════════════════════════════ */

/* ── 入场：侧边栏 ── */
.sidebar {
animation: sidebarSlide 0.7s cubic-bezier(0.22, 1, 0.36, 1) both;
}
@keyframes sidebarSlide {
from { opacity: 0; transform: translateX(-40px); }
to { opacity: 1; transform: translateX(0); }
}

/* ── 入场：主内容区 ── */
.main-content {
animation: mainFade 0.8s cubic-bezier(0.22, 1, 0.36, 1) 0.15s both;
}
@keyframes mainFade {
from { opacity: 0; transform: translateY(20px); }
to { opacity: 1; transform: translateY(0); }
}

/* ── 入场：标题 ── */
.sidebar h2 {
animation: titleReveal 0.6s cubic-bezier(0.22, 1, 0.36, 1) 0.3s both;
}
@keyframes titleReveal {
from { opacity: 0; transform: translateY(-10px) scale(0.95); letter-spacing: 0.1em; }
to { opacity: 1; transform: translateY(0) scale(1); letter-spacing: -0.01em; }
}

/* ── 入场：信息条 ── */
.info-text {
animation: infoSlide 0.5s cubic-bezier(0.22, 1, 0.36, 1) 0.4s both;
}
@keyframes infoSlide {
from { opacity: 0; transform: scale(0.96); }
to { opacity: 1; transform: scale(1); }
}

/* ── 入场：输入框依次滑入 ── */
.sidebar .input-group {
animation: inputFade 0.5s cubic-bezier(0.22, 1, 0.36, 1) both;
}
.sidebar .input-group:nth-of-type(1) { animation-delay: 0.45s; }
.sidebar .input-group:nth-of-type(2) { animation-delay: 0.55s; }
.sidebar .input-group:nth-of-type(3) { animation-delay: 0.65s; }
@keyframes inputFade {
from { opacity: 0; transform: translateX(-15px); }
to { opacity: 1; transform: translateX(0); }
}

/* ── 入场：checkbox容器 ── */
.checkbox-container {
animation: inputFade 0.5s cubic-bezier(0.22, 1, 0.36, 1) 0.6s both;
}

/* ── 入场：按钮依次弹出 ── */
.sidebar > button {
animation: btnPop 0.45s cubic-bezier(0.22, 1, 0.36, 1) both;
}
.btn-scan { animation-delay: 0.7s; }
.btn-attack { animation-delay: 0.8s; }
.sidebar > .btn-tool:nth-of-type(1) { animation-delay: 0.9s; }
.sidebar > .btn-tool:nth-of-type(2) { animation-delay: 1.0s; }
@keyframes btnPop {
from { opacity: 0; transform: translateY(12px) scale(0.95); }
to { opacity: 1; transform: translateY(0) scale(1); }
}

/* ── 入场：状态栏 ── */
.status-bar {
animation: statusGlow 0.6s cubic-bezier(0.22, 1, 0.36, 1) 1.1s both;
}
@keyframes statusGlow {
from { opacity: 0; transform: translateY(10px); }
to { opacity: 1; transform: translateY(0); }
}

/* ── 入场：工具栏按钮 ── */
.toolbar .mini-btn:nth-child(1) { animation: toolFade 0.4s cubic-bezier(0.22, 1, 0.36, 1) 0.3s both; }
.toolbar .mini-btn:nth-child(2) { animation: toolFade 0.4s cubic-bezier(0.22, 1, 0.36, 1) 0.4s both; }
.toolbar .mini-btn:nth-child(3) { animation: toolFade 0.4s cubic-bezier(0.22, 1, 0.36, 1) 0.5s both; }
@keyframes toolFade {
from { opacity: 0; transform: translateY(-8px); }
to { opacity: 1; transform: translateY(0); }
}

/* ── 入场：列表头部 ── */
.list-header {
animation: headerFade 0.5s cubic-bezier(0.22, 1, 0.36, 1) 0.6s both;
}
@keyframes headerFade {
from { opacity: 0; }
to { opacity: 1; }
}

/* ── 入场：列表容器 ── */
.list-container {
animation: listReveal 0.6s cubic-bezier(0.22, 1, 0.36, 1) 0.7s both;
}
@keyframes listReveal {
from { opacity: 0; transform: scale(0.98); }
to { opacity: 1; transform: scale(1); }
}

/* ── 侧边栏渐变线流动 ── */
.sidebar::before {
animation: gradientFlow 6s ease-in-out infinite;
background-size: 100% 200%;
}
@keyframes gradientFlow {
0%, 100% { background-position: 0% 0%; }
50% { background-position: 0% 100%; }
}

/* ── 按钮悬浮光泽扫过 ── */
.btn-scan::before,
.btn-attack::before {
content: '';
position: absolute;
top: 0; left: -100%;
width: 100%; height: 100%;
background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
transition: left 0.5s;
}
.btn-scan:hover::before,
.btn-attack:hover::before {
left: 100%;
}

/* ── 复选框勾选弹跳 ── */
.p-chk:checked {
animation: checkBounce 0.35s cubic-bezier(0.68, -0.55, 0.265, 1.55);
}
@keyframes checkBounce {
0% { transform: scale(0.8); }
50% { transform: scale(1.2); }
100% { transform: scale(1); }
}
#bi_dir:checked {
animation: checkBounce 0.35s cubic-bezier(0.68, -0.55, 0.265, 1.55);
}

/* ── VIP徽章浮动+闪光 ── */
.vip-badge {
animation: vipFloat 3s ease-in-out infinite, vipShine 4s ease-in-out infinite;
}
@keyframes vipFloat {
0%, 100% { transform: translateY(0); }
50% { transform: translateY(-2px); }
}
@keyframes vipShine {
0%, 100% { box-shadow: 0 0 0 rgba(245, 158, 11, 0); }
50% { box-shadow: 0 0 12px rgba(245, 158, 11, 0.15); }
}

/* ── 状态栏运行中呼吸 ── */
.status-active {
animation: statusPulse 2.5s ease-in-out infinite !important;
}
@keyframes statusPulse {
0%, 100% { box-shadow: 0 0 30px rgba(16, 185, 129, 0.05), inset 0 0 30px rgba(16, 185, 129, 0.03); }
50% { box-shadow: 0 0 40px rgba(16, 185, 129, 0.1), inset 0 0 40px rgba(16, 185, 129, 0.06); }
}

/* ── 背景光晕缓慢漂移 ── */
body::before {
animation: ambientDrift1 20s ease-in-out infinite;
}
@keyframes ambientDrift1 {
0%, 100% { transform: translate(0, 0); }
33% { transform: translate(30px, -20px); }
66% { transform: translate(-20px, 15px); }
}
body::after {
animation: ambientDrift2 25s ease-in-out infinite;
}
@keyframes ambientDrift2 {
0%, 100% { transform: translate(0, 0); }
33% { transform: translate(-25px, 20px); }
66% { transform: translate(15px, -25px); }
}

/* ── 列表头部圆点呼吸 ── */
.list-header::before {
animation: headerDotPulse 2s ease-in-out infinite !important;
}
@keyframes headerDotPulse {
0%, 100% { opacity: 0.4; transform: scale(1); }
50% { opacity: 1; transform: scale(1.3); }
}

/* ── checkbox容器悬浮微抬 ── */
.checkbox-container {
transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
}
.checkbox-container:hover {
transform: translateY(-1px);
}

/* ── 工具栏按钮悬浮底部发光线 ── */
.mini-btn::after {
content: '';
position: absolute;
bottom: 0; left: 50%;
width: 0; height: 1px;
background: linear-gradient(90deg, transparent, var(--accent-primary), transparent);
transition: all 0.3s;
transform: translateX(-50%);
}
.mini-btn:hover::after {
width: 80%;
}

/* ── 空状态图标呼吸 ── */
#player_list > div > div:first-child {
animation: emptyIconPulse 3s ease-in-out infinite;
}
@keyframes emptyIconPulse {
0%, 100% { transform: scale(1); opacity: 0.5; }
50% { transform: scale(1.05); opacity: 0.7; }
}


/* ── 输入框聚焦label微动 ── */
.input-group:focus-within label {
animation: labelShift 0.3s ease-out forwards;
}
@keyframes labelShift {
from { transform: translateX(0); opacity: 0.7; }
to { transform: translateX(3px); opacity: 1; }
}

/* ── 玩家行悬浮时文字微间距 ── */
.player-item:hover > span {
transition: letter-spacing 0.3s ease;
letter-spacing: 0.02em;
}

/* ── info-text shimmer ── */
.info-text::before {
animation: shimmer 3s ease-in-out infinite;
}

/* ── 全局平滑 ── */
html { scroll-behavior: smooth; }
.player-item { will-change: transform, background; }

/* ══════════════════════════════════════
   MOBILE RESPONSIVE
══════════════════════════════════════ */

/* ── 平板 & 手机竖屏 ── */
@media (max-width: 768px) {
  body {
    flex-direction: column;
    height: 100vh;
    overflow-y: auto;
  }
  .sidebar {
    width: 100%;
    max-height: none;
    height: auto;
    padding: 20px 16px 16px;
    border-right: none;
    border-bottom: 1px solid var(--border);
    overflow-y: visible;
    flex-shrink: 0;
  }
  .sidebar::before {
    width: 100%;
    height: 2px;
    background: linear-gradient(90deg, #6366f1 0%, #8b5cf6 40%, #10b981 100%);
  }
  .sidebar h2 { font-size: 1rem; margin-bottom: 16px; }
  .info-text { font-size: 10px; padding: 10px 12px; margin-bottom: 16px; }
  .input-group { margin-bottom: 14px; }
  .input-group label { font-size: 9px; margin-bottom: 6px; }
  input[type="text"], input[type="number"] { padding: 10px 12px; font-size: 11px; }
  button { padding: 12px 14px; font-size: 12px; margin-top: 8px; }
  .checkbox-container { padding: 10px 12px; margin-bottom: 14px; }
  .checkbox-container label { font-size: 12px; }
  .main-content {
    flex: 1;
    padding: 16px;
    display: flex;
    flex-direction: column;
    min-height: 0;
  }
  .toolbar { margin-bottom: 12px; gap: 6px; }
  .mini-btn { padding: 9px 14px; font-size: 10px; flex: 1; text-align: center; }
  .list-header { font-size: 10px; margin-bottom: 10px; padding-left: 12px; }
  .list-container {
    flex: 1;
    border-radius: 12px;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
  }
  .player-item { padding: 14px 16px; }
  .player-item:hover { padding-left: 16px; }
  .player-item span { font-size: 11px !important; }
  .vip-badge { font-size: 8px; padding: 2px 8px; }
  .status-bar { margin-top: 12px; padding: 10px 14px; font-size: 10px; }
  /* 触摸优化 */
  button, .player-item, .mini-btn, .p-chk, #bi_dir {
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
  }
  button:active { transform: scale(0.96); opacity: 0.9; }
  .player-item:active { background: rgba(99, 102, 241, 0.08); }
}

/* ── 小屏手机 ── */
@media (max-width: 480px) {
  .sidebar { padding: 16px 12px 12px; }
  .sidebar h2 { font-size: 0.9rem; gap: 6px; }
  .info-text { font-size: 9px; padding: 8px 10px; }
  input[type="text"], input[type="number"] { padding: 9px 10px; font-size: 10px; }
  button { padding: 10px 12px; font-size: 11px; }
  .main-content { padding: 12px; }
  .mini-btn { padding: 7px 10px; font-size: 9px; }
  .player-item { padding: 10px 12px; }
  .player-item span { font-size: 10px !important; }
}

/* ── 横屏模式 ── */
@media (max-width: 768px) and (orientation: landscape) {
  body { flex-direction: row; overflow: hidden; }
  .sidebar {
    width: 260px;
    height: 100vh;
    max-height: 100vh;
    overflow-y: auto;
    border-right: 1px solid var(--border);
    border-bottom: none;
  }
  .sidebar::before {
    width: 2px;
    height: 100%;
    background: linear-gradient(180deg, #6366f1 0%, #8b5cf6 40%, #10b981 100%);
  }
  .main-content { flex: 1; padding: 20px; }
}
    </style>
</head>
<body>

<div class="sidebar">
    <h2>⚙️ 房间设置</h2>
    <div class="info-text">🚪 房间ID: {{ info.local_ip }}</div>
    <div class="input-group">
        <label>房主 (Gateway):</label>
        <input type="text" id="gw_ip" value="{{ info.gateway_ip }}">
    </div>
    <div class="input-group">
        <label>VIP用户名单:</label>
        <input type="text" id="whitelist" placeholder="逗号分隔账户 IP" value="{{ whitelist_str }}">
    </div>
    <div class="checkbox-container">
        <input type="checkbox" id="bi_dir" checked>
        <label for="bi_dir">游客登陆模式</label>
    </div>
    <div class="input-group">
        <label>⏱️ 加入间隔 (秒)</label>
        <input type="number" id="interval_input" min="0.1" max="999.0" step="0.1" value="2.0">
    </div>
    <button class="btn-scan" id="scan_btn" onclick="startScan()">🔍 寻找玩家</button>
    <button class="btn-attack" id="atk_btn" onclick="toggleAttack()">🚪 开启房间</button>
    <button class="btn-tool" onclick="triggerLock()">✧ 原神 UUID 协议绑定</button>
    <button class="btn-tool" style="border-color: var(--accent-danger); color: var(--accent-danger); margin-top: 15px;" onclick="endProcess()">⚠️ 结束后端进程</button>
    <div class="status-bar" id="status_msg">服务器已就绪</div>
</div>

<div class="main-content">
    <div class="toolbar">
        <button class="mini-btn" onclick="selectAll(true)">全部玩家</button>
        <button class="mini-btn" onclick="invertSelection()">其余玩家</button>
        <button class="mini-btn" onclick="selectAll(false)">没有玩家</button>
    </div>
    <div class="list-header">服务器列表 (双击名单可直接充值 VIP)</div>
    <div class="list-container" id="player_list">
        <div style="padding: 60px 40px; text-align: center; color: var(--text-muted);">
            <div style="font-size: 48px; margin-bottom: 16px; opacity: 0.5;">🌐</div>
            等待探测信号...
        </div>
    </div>
</div>

<script>
    // ---------- 全局变量 ----------
    let isRunning = false;
    let players = [];
    let selectedTargets = new Set();
    let currentInterval = 2.0;

    // 缓存，减少DOM操作
    let _lastPlayersJson = '';
    let _lastTargetsJson = '';
    let _lastWhitelistJson = '';
    let _lastBidirectional = null;
    let _lastInterval = null;
    let _lastRunning = null;
    let _lastPacketCount = -1;

    const intervalInput = document.getElementById('interval_input');
    const biDirCheck = document.getElementById('bi_dir');
    const whitelistInput = document.getElementById('whitelist');
    const gwIpInput = document.getElementById('gw_ip');

    // ---------- 同步函数 ----------
    async function syncTargetsToBackend() {
        const targets = Array.from(selectedTargets).map(ip => {
            const p = players.find(p => p.ip === ip);
            return p ? { ip: p.ip, mac: p.mac, checked: true } : null;
        }).filter(t => t);
        try {
            await fetch('/api/update_targets', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ targets })
            });
        } catch(e) { console.warn(e); }
    }

    async function syncConfig() {
        const bidirectional = biDirCheck.checked;
        const interval = currentInterval;
        try {
            await fetch('/api/update_config', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ bidirectional, interval })
            });
        } catch(e) {}
    }

    async function syncWhitelistToBackend() {
        const current = whitelistInput.value.split(',').map(s=>s.trim()).filter(s=>s);
        try {
            await fetch('/api/update_whitelist', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ whitelist: current })
            });
        } catch(e) {}
    }

    intervalInput.addEventListener('input', (e) => {
        let val = parseFloat(e.target.value);
        if (isNaN(val)) val = 2.0;
        val = Math.min(999.0, Math.max(0.1, val));
        currentInterval = val;
        intervalInput.value = val.toFixed(1);
        syncConfig();
    });

    biDirCheck.addEventListener('change', () => {
        syncConfig();
    });

    whitelistInput.addEventListener('change', () => {
        syncWhitelistToBackend();
    });

    // ---------- 全量状态同步（带缓存检测）----------
    async function pullFullState() {
        try {
            const res = await fetch('/api/state');
            if (!res.ok) return;
            const state = await res.json();

            // 运行状态 + 包计数
            if (state.running !== _lastRunning || (state.running && state.packet_count !== _lastPacketCount)) {
                _lastRunning = state.running;
                _lastPacketCount = state.packet_count;
                if (state.running !== isRunning) {
                    isRunning = state.running;
                    const btn = document.getElementById('atk_btn');
                    const status = document.getElementById('status_msg');
                    if (isRunning) {
                        btn.innerText = "❎ 关闭房间";
                        btn.className = "btn-stop";
                        status.classList.add('status-active');
                        status.innerText = `房间运行中... 累计掉落物: ${state.packet_count}`;
                    } else {
                        btn.innerText = "🚪 开启房间";
                        btn.className = "btn-attack";
                        status.classList.remove('status-active');
                        status.innerText = `房间已停止`;
                    }
                } else if (isRunning) {
                    document.getElementById('status_msg').innerText = `房间运行中... 累计掉落物: ${state.packet_count}`;
                }
            }

            // 配置
            if (state.bidirectional !== _lastBidirectional || state.interval !== _lastInterval) {
                _lastBidirectional = state.bidirectional;
                _lastInterval = state.interval;
                biDirCheck.checked = state.bidirectional;
                currentInterval = state.interval;
                intervalInput.value = state.interval.toFixed(1);
            }

            // 白名单
            const whitelistStr = state.whitelist.join(', ');
            if (whitelistStr !== _lastWhitelistJson) {
                _lastWhitelistJson = whitelistStr;
                whitelistInput.value = whitelistStr;
            }

            // 玩家列表 + 勾选
            const clientsJson = JSON.stringify(state.clients || []);
            const targetsJson = JSON.stringify(state.targets || []);
            if (clientsJson !== _lastPlayersJson || targetsJson !== _lastTargetsJson) {
                _lastPlayersJson = clientsJson;
                _lastTargetsJson = targetsJson;
                if (state.clients && state.clients.length > 0) {
                    const serverTargetIps = new Set(state.targets || []);
                    players = state.clients;
                    selectedTargets = new Set();
                    for (const targetIp of serverTargetIps) {
                        if (players.some(p => p.ip === targetIp)) selectedTargets.add(targetIp);
                    }
                    renderPlayers();
                }
            }
        } catch(e) {
            if (isRunning) {
                isRunning = false;
                _lastRunning = false;
                const btn = document.getElementById('atk_btn');
                const status = document.getElementById('status_msg');
                btn.innerText = "🚪 开启房间";
                btn.className = "btn-attack";
                status.classList.remove('status-active');
                status.innerText = "连接中断，后端可能已停止";
            }
        }
    }

    // ---------- 渲染玩家列表 ----------
    function renderPlayers() {
        const container = document.getElementById('player_list');
        const currentVips = whitelistInput.value.split(',').map(s=>s.trim()).filter(s=>s);
        if (players.length === 0) {
            container.innerHTML = '<div style="padding: 60px 40px; text-align: center; color: var(--text-muted);"><div style="font-size: 48px; margin-bottom: 16px; opacity: 0.5;">📭</div>未发现玩家</div>';
            return;
        }
        container.innerHTML = players.map((p, index) => {
            const isVip = currentVips.includes(p.ip) || p.is_safe;
            const isChecked = selectedTargets.has(p.ip) && !isVip;
            let color = "#e2e8f0";
            if (p.role === "管理") color = "var(--accent-warning)";
            else if (p.role === "房主") color = "var(--accent-primary)";
            else if (isVip) color = "var(--text-muted)";
            return `
                <div class="player-item ${isVip ? 'is-safe' : ''}" data-ip="${p.ip}" ondblclick="toggleVip('${p.ip}')" style="animation-delay: ${(index*0.04).toFixed(2)}s">
                    <input type="checkbox" class="p-chk" data-ip="${p.ip}" data-mac="${p.mac}" ${isVip ? 'disabled' : ''} ${isChecked ? 'checked' : ''}>
                    <span style="color:${color}; font-family: 'JetBrains Mono', monospace; font-size: 13px; flex: 1;">
                        ${p.ip.padEnd(15)} <span style="color:var(--border)">|</span> ${p.mac}
                        <span style="margin-left:10px; font-weight:bold">${p.role ? '['+p.role+']' : ''}</span>
                    </span>
                    ${isVip ? '<span class="vip-badge">★ VIP</span>' : ''}
                </div>
            `;
        }).join('');
        // 绑定复选框事件
        document.querySelectorAll('.p-chk:not(:disabled)').forEach(cb => {
            cb.addEventListener('change', () => {
                const ip = cb.dataset.ip;
                if (cb.checked) selectedTargets.add(ip);
                else selectedTargets.delete(ip);
                syncTargetsToBackend();
            });
        });
    }

    // ---------- 双击 VIP ----------
    window.toggleVip = async function(ip) {
        let current = whitelistInput.value.split(',').map(s=>s.trim()).filter(s=>s);
        if (current.includes(ip)) {
            current = current.filter(item => item !== ip);
            document.getElementById('status_msg').innerText = `玩家 ${ip} 已移出 VIP`;
            document.getElementById('status_msg').style.color = 'var(--text-muted)';
        } else {
            current.push(ip);
            document.getElementById('status_msg').innerText = `玩家 ${ip} 已升级为 VIP`;
            document.getElementById('status_msg').style.color = 'var(--accent-warning)';
            if (selectedTargets.has(ip)) {
                selectedTargets.delete(ip);
                syncTargetsToBackend();
            }
        }
        whitelistInput.value = current.join(', ');
        syncWhitelistToBackend();
        renderPlayers();
    };

    // ---------- 扫描 ----------
    async function startScan() {
        const btn = document.getElementById('scan_btn');
        const status = document.getElementById('status_msg');
        btn.innerText = "信号探测中...";
        btn.disabled = true;
        try {
            const res = await fetch('/api/scan', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    gateway_ip: gwIpInput.value,
                    whitelist: whitelistInput.value.split(',').map(s=>s.trim()).filter(s=>s)
                })
            });
            players = await res.json();
            selectedTargets.clear();
            renderPlayers();
            await pullFullState();
            status.innerText = `探测完毕: 发现 ${players.length} 个活跃玩家`;
            status.className = "status-bar";
        } catch (e) {
            players = [];
            selectedTargets.clear();
            renderPlayers();
            status.innerText = `扫描失败: ${e.message}`;
        } finally {
            btn.innerText = "🔍 寻找玩家";
            btn.disabled = false;
        }
    }
    window.startScan = startScan;

    // ---------- 全选/反选/清空 ----------
    function selectAll(val) {
        const currentVips = whitelistInput.value.split(',').map(s=>s.trim()).filter(s=>s);
        players.forEach(p => {
            if (!currentVips.includes(p.ip) && !p.is_safe) {
                if (val) selectedTargets.add(p.ip);
                else selectedTargets.delete(p.ip);
            }
        });
        renderPlayers();
        syncTargetsToBackend();
    }
    function invertSelection() {
        const currentVips = whitelistInput.value.split(',').map(s=>s.trim()).filter(s=>s);
        players.forEach(p => {
            if (!currentVips.includes(p.ip) && !p.is_safe) {
                if (selectedTargets.has(p.ip)) selectedTargets.delete(p.ip);
                else selectedTargets.add(p.ip);
            }
        });
        renderPlayers();
        syncTargetsToBackend();
    }
    window.selectAll = selectAll;
    window.invertSelection = invertSelection;

    // ---------- 攻击 ----------
    async function toggleAttack() {
        const btn = document.getElementById('atk_btn');
        const status = document.getElementById('status_msg');
        if (!isRunning) {
            const selected = Array.from(selectedTargets).map(ip => {
                const p = players.find(p => p.ip === ip);
                return p ? { ip: p.ip, mac: p.mac, checked: true } : null;
            }).filter(t => t);
            if (selected.length === 0) {
                alert("请至少选择一名玩家进入房间");
                return;
            }
            try {
                const resp = await fetch('/api/control', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        action: 'start',
                        targets: selected,
                        bidirectional: biDirCheck.checked,
                        whitelist: whitelistInput.value.split(',').map(s=>s.trim()).filter(s=>s),
                        interval: currentInterval
                    })
                });
                const data = await resp.json();
                if (!data.running) {
                    alert("后端启动失败，请检查服务状态");
                    return;
                }
            } catch(e) {
                alert("请求后端失败，请确认服务是否在运行");
                return;
            }
            isRunning = true;
            btn.innerText = "❎ 关闭房间";
            btn.className = "btn-stop";
            status.classList.add('status-active');
            status.innerText = "房间运行中... 累计掉落物: 0";
        } else {
            try {
                await fetch('/api/control', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ action: 'stop' }) });
            } catch(e) {}
            isRunning = false;
            btn.innerText = "🚪 开启房间";
            btn.className = "btn-attack";
            status.classList.remove('status-active');
            status.innerText = "房间已正常关闭";
        }
    }
    window.toggleAttack = toggleAttack;

    // ---------- 其他 ----------
    async function endProcess() {
        if (confirm("确定要完全结束并退出后端程序吗？")) {
            try {
                await fetch('/api/quit', { method: 'POST' });
                document.body.innerHTML = "<div style='color:white; padding:50px; text-align:center;'>程序已关闭，请手动关闭此页面。</div>";
            } catch (e) {
                alert("请求失败，后端可能已经关闭");
            }
        }
    }
    window.endProcess = endProcess;

    async function triggerLock() {
        try { await fetch('/api/openlock', { method: 'POST' }); } catch(e) {}
    }
    window.triggerLock = triggerLock;

    // 初始化同步
    window.addEventListener('load', pullFullState);
    setInterval(pullFullState, 3000);
</script>
</body>
</html>
